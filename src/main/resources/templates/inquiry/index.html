<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ - デマス</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/footer.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background: #F5F5F5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            zoom: 0.9;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #555;
            text-decoration: none;
            font-size: 14px;
            margin: 24px auto 0;
            max-width: 680px;
            width: 100%;
            padding: 0 16px;
        }
        .back-link:hover { color: #00C896; }
        .container {
            max-width: 680px;
            margin: 16px auto 48px;
            padding: 0 16px;
            flex: 1;
            width: 100%;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 36px 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            margin-bottom: 20px;
        }
        /* 페이지 헤더 */
        .page-header {
            padding: 12px 24px 24px;
            text-align: center;
        }
        .page-title {
            font-size: 24px;
            font-weight: 700;
            color: #1A1A1A;
            margin-bottom: 6px;
        }
        .page-subtitle {
            font-size: 13px;
            color: #888;
        }
        /* 문의 타입 선택 */
        .type-label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }
        .type-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }
        .type-btn {
            flex: 1;
            padding: 14px 8px;
            border: 1.5px solid #E0E0E0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            font-size: 13px;
            font-weight: 500;
            color: #666;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .type-btn:hover { border-color: #00C896; color: #00C896; }
        .type-btn.active {
            border-color: #00C896;
            background: #F0FAF6;
            color: #00C896;
        }
        /* 폼 */
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .form-group label .required {
            color: #E53E3E;
            margin-left: 2px;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #E0E0E0;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            transition: border-color 0.2s;
            resize: none;
            outline: none;
            color: #1A1A1A;
        }
        .form-group input:focus,
        .form-group textarea:focus { border-color: #00C896; }
        .form-group textarea { height: 150px; }
        .textarea-wrapper { position: relative; }
        .char-count {
            text-align: right;
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        /* 안내 박스 */
        .info-box {
            background: #F0FAF6;
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 20px;
        }
        .info-box-title {
            font-size: 13px;
            font-weight: 700;
            color: #1A1A1A;
            margin-bottom: 8px;
        }
        .info-box ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .info-box ul li {
            font-size: 13px;
            color: #555;
            padding-left: 12px;
            position: relative;
        }
        .info-box ul li::before {
            content: '•';
            position: absolute;
            left: 0;
            color: #00C896;
        }
        /* 제출 버튼 */
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: #00C896;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            transition: background 0.2s;
        }
        .submit-btn:hover { background: #00B385; }
        /* 성공 메시지 */
        .success-msg {
            background: #E8F5F1;
            border: 1.5px solid #00C896;
            color: #007A5E;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        /* 하단 info 카드들 */
        .bottom-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .info-card {
            background: white;
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .info-card-icon {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }
        .info-card h4 {
            font-size: 14px;
            font-weight: 700;
            color: #1A1A1A;
            margin-bottom: 6px;
        }
        .info-card p {
            font-size: 13px;
            color: #888;
            line-height: 1.6;
        }
        .info-card a {
            color: #00C896;
            text-decoration: none;
            font-size: 13px;
        }
    </style>
</head>
<body>

<!-- 공통 헤더 -->
<div th:replace="~{fragments/header :: headerAndToast}"></div>

<!-- 페이지 헤더 -->
<div class="page-header">
    <h1 class="page-title">お問い合わせ</h1>
    <p class="page-subtitle">ご質問やご意見をお聞かせください</p>
</div>

<div class="container">

    <!-- 문의 작성 폼 -->
    <div class="card">

        <!-- 성공 메시지 -->
        <div class="success-msg" th:if="${param.success}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00C896" stroke-width="2.5">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            お問い合わせを受け付けました。回答までしばらくお待ちください。
        </div>

        <form action="/inquiry" method="post">
            <!-- 문의 타입 -->
            <div class="type-label">お問い合わせ種類</div>
            <div class="type-buttons">
                <button type="button" class="type-btn active" onclick="selectType(this, '一般')">
                    <span style="font-size:22px;">💬</span>
                    一般的なお問い合わせ
                </button>
                <button type="button" class="type-btn" onclick="selectType(this, 'バグ')">
                    <span style="font-size:22px;">🐛</span>
                    バグ報告
                </button>
                <button type="button" class="type-btn" onclick="selectType(this, '機能提案')">
                    <span style="font-size:22px;">💡</span>
                    機能提案
                </button>
            </div>
            <input type="hidden" name="inquiryType" id="inquiryTypeInput" value="一般">

            <!-- 이메일 -->
            <div class="form-group">
                <label>メールアドレス <span class="required">*</span></label>
                <input type="email" name="email" placeholder="example@email.com" required>
            </div>

            <!-- 제목 -->
            <div class="form-group">
                <label>件名 <span class="required">*</span></label>
                <input type="text" name="title" placeholder="お問い合わせの件名を入力してください" required>
            </div>

            <!-- 내용 -->
            <div class="form-group">
                <label>お問い合わせ内容 <span class="required">*</span></label>
                <div class="textarea-wrapper">
                    <textarea name="content" id="contentArea" placeholder="詳細な内容をご記入ください" maxlength="500" oninput="updateCount()" required></textarea>
                    <div class="char-count"><span id="charCount">0</span> / 500</div>
                </div>
            </div>

            <!-- 안내 박스 -->
            <div class="info-box">
                <div class="info-box-title">お問い合わせについて</div>
                <ul>
                    <li>通常、1〜2営業日以内にご返信いたします</li>
                    <li>緊急の場合は、件名に「緊急」と記載してください</li>
                    <li>個人情報は適切に管理いたします</li>
                </ul>
            </div>

            <button type="submit" class="submit-btn">送信する</button>
        </form>
    </div>

    <!-- 하단 카드 -->
    <div class="bottom-cards">
        <div class="info-card">
            <div class="info-card-icon">
                <span style="font-size:20px;">📧</span>
            </div>
            <h4>メールでのお問い合わせ</h4>
            <p>直接メールでもお問い合わせいただけます</p>
            <a href="mailto:support@toiletmap.com">support@toiletmap.com</a>
        </div>
        <div class="info-card">
            <div class="info-card-icon">
                <span style="font-size:20px;">🕐</span>
            </div>
            <h4>サポート時間</h4>
            <p>平日 9:00 - 18:00<br>土日祝日は翌営業日に対応いたします</p>
        </div>
    </div>

</div>

<!-- 공통 푸터 -->
<footer th:replace="~{fragments/footer :: footer}"></footer>

<script th:src="@{/js/header.js(v=1)}"></script>
<script>
    function selectType(btn, type) {
        document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('inquiryTypeInput').value = type;
    }
    function updateCount() {
        var len = document.getElementById('contentArea').value.length;
        document.getElementById('charCount').textContent = len;
    }
</script>

</body>
</html>
