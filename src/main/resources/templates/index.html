<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トイレマップ - デマス</title>
    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/footer.css">
    <link rel="stylesheet" href="/css/index.css?v=5">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@linefukuoka/line-seed-jp@1.0.0/fonts/css/line-seed-jp.css">
    <style>
        /* ===== Splash Screen ===== */
        #splash-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(145deg, #00C896 0%, #00A880 100%);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: opacity 0.75s ease;
        }
        #splash-screen.splash-out {
            opacity: 0;
            pointer-events: none;
        }

        /* 로고 전체: 블러 해제 + 줌인 */
        .splash-inner {
            text-align: center;
            position: relative;
            animation: sBlurIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes sBlurIn {
            from { filter: blur(18px); transform: scale(1.18); opacity: 0; }
            to   { filter: blur(0);    transform: scale(1);    opacity: 1; }
        }

        /* 핀 */
        .splash-pin-wrap {
            position: relative;
            width: 72px;
            height: 72px;
            margin: 0 auto 28px;
        }
        .s-ring {
            position: absolute;
            border-radius: 50%;
            border: 2.5px solid rgba(255,255,255,0.75);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.2);
            opacity: 0;
        }
        .s-ring-1 { width: 120px; height: 120px; animation: sRing 2.2s ease-out 0.8s infinite; }
        .s-ring-2 { width: 190px; height: 190px; animation: sRing 2.2s ease-out 1.2s infinite; }
        .s-ring-3 { width: 260px; height: 260px; animation: sRing 2.2s ease-out 1.6s infinite; }
        @keyframes sRing {
            0%   { transform: translate(-50%, -50%) scale(0.2); opacity: 1; }
            60%  { opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1);   opacity: 0; }
        }
        .splash-pin-icon {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) translateY(-20px) scale(0.6);
            opacity: 0;
            animation: sPinDrop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s forwards;
        }
        @keyframes sPinDrop {
            to { transform: translate(-50%, -50%) translateY(0) scale(1); opacity: 1; }
        }

        /* 브랜드 텍스트 */
        .splash-brand {
            font-family: 'LINESeedJP_OTF', 'Noto Sans JP', sans-serif;
            font-size: 64px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 0.14em;
            opacity: 0;
            animation: sSlideUp 0.6s ease 0.7s forwards;
        }
        .splash-tagline {
            font-family: 'LINESeedJP_OTF', 'Noto Sans JP', sans-serif;
            font-size: 17px;
            color: rgba(255,255,255,0.85);
            letter-spacing: 0.1em;
            margin-top: 14px;
            opacity: 0;
            overflow: hidden;
            white-space: nowrap;
            width: 0;
            border-right: 2px solid rgba(255,255,255,0.7);
            animation: sTaglineFade 0.01s ease 1.0s forwards;
        }
        @keyframes sTaglineFade {
            to { opacity: 1; }
        }
        .splash-tagline.typing {
            animation: sTaglineFade 0.01s ease 1.0s forwards,
                       typing 0.6s steps(15, end) 1.1s forwards,
                       blink 0.6s step-end 1.1s 5;
        }
        @keyframes sSlideUp {
            from { transform: translateY(14px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        @keyframes typing {
            from { width: 0; }
            to   { width: 16em; }
        }
        @keyframes blink {
            50% { border-color: transparent; }
        }

        /* ===== Location Permission Modal ===== */
        #location-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(6px);
            z-index: 9998;
            align-items: center;
            justify-content: center;
        }
        #location-modal.show {
            display: flex;
            animation: locIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes locIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        .loc-card {
            background: #fff;
            border-radius: 24px;
            padding: 40px 32px 32px;
            width: 320px;
            max-width: 88vw;
            text-align: center;
            box-shadow: 0 24px 64px rgba(0,0,0,0.18);
            animation: locCardIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes locCardIn {
            from { transform: scale(0.88) translateY(20px); opacity: 0; }
            to   { transform: scale(1) translateY(0); opacity: 1; }
        }
        .loc-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #00C896, #00A880);
            border-radius: 20px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .loc-title {
            font-family: 'LINESeedJP_OTF', 'Noto Sans JP', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #1B1D1F;
            margin-bottom: 12px;
            letter-spacing: 0.05em;
        }
        .loc-desc {
            font-family: 'LINESeedJP_OTF', 'Noto Sans JP', sans-serif;
            font-size: 14px;
            color: #6B7684;
            line-height: 1.75;
            margin-bottom: 28px;
            letter-spacing: 0.03em;
        }
        .loc-btn-allow {
            display: block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #00C896, #00A880);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-family: 'LINESeedJP_OTF', 'Noto Sans JP', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 10px;
            letter-spacing: 0.05em;
            transition: all 0.2s ease;
        }
        .loc-btn-allow:hover {
            box-shadow: 0 6px 20px rgba(0,200,150,0.35);
            transform: translateY(-1px);
        }
        .loc-btn-later {
            display: block;
            width: 100%;
            padding: 15px;
            background: #fff;
            color: #6B7684;
            border: 1.5px solid #DEE3E8;
            border-radius: 14px;
            font-family: 'LINESeedJP_OTF', 'Noto Sans JP', sans-serif;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: all 0.2s ease;
        }
        .loc-btn-later:hover {
            background: #F8FAFB;
            border-color: #C5CCD3;
        }
        @keyframes sSlideUp {
            to { transform: translateY(0); opacity: 1; }
        }
        /* zoom: 0.9 보정 - 화면 꽉 채우기 */
        body { height: calc(100vh / 0.9) !important; overflow: hidden !important; }
        .main-container { height: calc(100vh / 0.9 - 66px) !important; }

        /* 지도 페이지 전용 - 구글맵스타일 오버레이 푸터 */
        .site-footer .footer-content { display: none !important; }
        .site-footer {
            position: fixed !important;
            bottom: 0 !important;
            left: 0 !important;
            right: 0 !important;
            z-index: 50 !important;
            background: rgba(245,245,245,0.88) !important;
            backdrop-filter: blur(4px) !important;
            border: none !important;
            border-top: 1px solid rgba(0,0,0,0.06) !important;
            padding: 0 !important;
        }
        /* index 전용 푸터: 왼쪽 copyright, 오른쪽 링크 */
        .site-footer .footer-bottom {
            max-width: 100% !important;
            border-top: none !important;
            padding: 4px 20px !important;
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
            font-size: 11px !important;
            color: #666 !important;
        }
        .site-footer .footer-bottom::before { display: none !important; }
        .site-footer .footer-bottom-links {
            display: flex !important;
            align-items: center !important;
            gap: 8px !important;
        }
        .site-footer .footer-bottom-links a {
            font-size: 11px !important;
            color: #666 !important;
            text-decoration: none !important;
            white-space: nowrap !important;
        }
        .site-footer .footer-bottom-links a:hover { color: #00C896 !important; }
        .site-footer .footer-bottom-links .footer-divider { color: #bbb !important; font-size: 10px !important; }
    </style>
</head>

<script>
    // /login 으로 리다이렉트된 경우 자동으로 로그인 모달 열기
    // ログアウト後（?logout=true）はモーダルを開かない
    if (window.location.pathname === '/login' && !window.location.search.includes('logout')) {
        openLoginModal();
    }

    function closeLoginModal() {
        document.getElementById('loginModal').style.display = 'none';
    }

    // 모달 배경 클릭시 닫기
    document.getElementById('loginModal').addEventListener('click', function(e) {
        if (e.target === this) {
            closeLoginModal();
        }
    });

    // ドロップダウン・トーストはheader.jsで管理
</script>

<script>
    // ===== Splash Screen (최초 1회만) =====
    (function () {
        const splash = document.getElementById('splash-screen');
        if (!splash) return;

        // 이미 본 경우 즉시 제거
        if (sessionStorage.getItem('splashShown')) {
            splash.remove();
            return;
        }

        sessionStorage.setItem('splashShown', '1');
        // 타이핑 효과 시작
        setTimeout(function () {
            var tagline = document.getElementById('splashTagline');
            if (tagline) tagline.classList.add('typing');
        }, 700);
        setTimeout(function () {
            splash.classList.add('splash-out');
            setTimeout(function () {
                splash.remove();
                // 위치 동의 팝업도 최초 1회만
                if (!sessionStorage.getItem('locationAsked')) {
                    sessionStorage.setItem('locationAsked', '1');
                    document.getElementById('location-modal').classList.add('show');
                }
            }, 750);
        }, 2800);
    })();

    function allowLocation() {
        dismissLocationModal();
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                function (pos) { /* app.js가 지도 중심 이동 처리 */ },
                function (err) { console.warn('位置情報が拒否されました:', err); }
            );
        }
    }

    function dismissLocationModal() {
        const modal = document.getElementById('location-modal');
        modal.style.transition = 'opacity 0.25s ease';
        modal.style.opacity = '0';
        setTimeout(function () {
            modal.classList.remove('show');
            modal.style.opacity = '';
            modal.style.transition = '';
        }, 250);
    }
</script>
</body>
</html>
