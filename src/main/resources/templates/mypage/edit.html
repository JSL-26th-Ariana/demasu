<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プロフィール編集 - デマス</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@linefukuoka/line-seed-jp@1.0.0/fonts/css/line-seed-jp.css">
  <link rel="stylesheet" th:href="@{/css/header.css}">
  <link rel="stylesheet" th:href="@{/css/footer.css}">
  <link rel="stylesheet" th:href="@{/css/mypage.css}">
</head>
<body class="mypage">

<div th:replace="~{fragments/header :: headerAndToast}"></div>

<!-- 페이지 헤더 -->
<div class="page-header">
  <h1 class="page-title">プロフィール編集</h1>
  <p class="page-subtitle">ニックネーム・メールアドレス・プロフィール画像を変更できます</p>
</div>

<main class="mypage-main">
  <div class="mypage-container">

    <nav class="mp-breadcrumb">
      <a th:href="@{/mypage}">マイページ</a>
      <span>›</span>
      <span>プロフィール編集</span>
    </nav>

    <div th:if="${errorMessage}" class="mp-alert mp-alert-error">
      ⚠️ <span th:text="${errorMessage}"></span>
    </div>

    <form th:action="@{/mypage/edit}" method="post" enctype="multipart/form-data">

      <div class="mp-edit-layout">

        <!-- 아이콘 섹션 (넷플릭스 스타일 프리셋 선택) -->
        <div class="mp-edit-icon-section">
          <div class="mp-icon-preview" id="iconPreviewWrap">
            <img th:if="${user.iconUrl != null}" th:src="@{${user.iconUrl}}" alt="プロフィール画像">
            <span th:if="${user.iconUrl == null}" style="display:flex; align-items:center; justify-content:center; width:100%; height:100%;">
                <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#00C896" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </span>
          </div>
          <button type="button" class="mp-icon-upload-btn" onclick="openIconSelector()">
            アイコンを選択
          </button>
          <input type="hidden" id="selectedIcon" name="iconUrl" th:value="${user.iconUrl}">
          <p class="mp-icon-hint">お好みのアイコンを選んでください</p>
        </div>

        <!-- 아이콘 선택 모달 -->
        <div id="iconSelectorModal" class="icon-modal-overlay" style="display:none;">
          <div class="icon-modal">
            <div class="icon-modal-header">
              <h3>アイコンを選択</h3>
              <button type="button" class="icon-modal-close" onclick="closeIconSelector()">&times;</button>
            </div>
            <div class="icon-modal-grid">
              <div class="icon-modal-item" onclick="selectIcon('profile_minseon', this)">
                <img th:src="@{/images/profiles/profile_minseon.png}" alt="アイコン1">
              </div>
              <div class="icon-modal-item" onclick="selectIcon('profile_minseon2', this)">
                <img th:src="@{/images/profiles/profile_minseon2.png}" alt="アイコン2">
              </div>
              <!-- 추후 아이콘 추가 시 여기에 동일한 형식으로 추가 -->
            </div>
            <div class="icon-modal-actions">
              <button type="button" class="mp-btn-cancel" onclick="closeIconSelector()">キャンセル</button>
              <button type="button" class="mp-btn-save" onclick="confirmIcon()">選択する</button>
            </div>
          </div>
        </div>

        <!-- 폼 섹션 -->
        <div class="mp-edit-form-section">

          <div class="mp-form-group">
            <label for="nickname">ニックネーム <span class="mp-required">*</span></label>
            <input type="text" id="nickname" name="nickname"
                   th:value="${user.nickname}"
                   placeholder="ニックネームを入力"
                   maxlength="20" required>
            <span class="mp-field-hint">20文字以内</span>
          </div>

          <div class="mp-form-group">
            <label for="email">メールアドレス <span class="mp-required">*</span></label>
            <input type="email" id="email" name="email"
                   th:value="${user.email}"
                   placeholder="メールアドレスを入力" required>
          </div>

          <div class="mp-form-group">
            <label for="phone">電話番号</label>
            <input type="tel" id="phone" name="phone"
                   th:value="${user.phone}"
                   placeholder="電話番号を入力">
          </div>

          <div class="mp-form-row">
            <div class="mp-form-group">
              <label for="gender">性別</label>
              <select id="gender" name="gender">
                <option value="">選択してください</option>
                <option value="M" th:selected="${user.gender == 'M'}">男性</option>
                <option value="F" th:selected="${user.gender == 'F'}">女性</option>
                <option value="OTHER" th:selected="${user.gender == 'OTHER'}">その他</option>
              </select>
            </div>
            <div class="mp-form-group">
              <label for="birthdate">生年月日</label>
              <input type="date" id="birthdate" name="birthdate"
                     th:value="${user.birthdate}">
            </div>
          </div>

          <div class="mp-form-actions">
            <a th:href="@{/mypage}" class="mp-btn-cancel">キャンセル</a>
            <button type="submit" class="mp-btn-save">保存する</button>
          </div>

        </div>
      </div>
    </form>

  </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/header.js(v=1)}"></script>
<style>
  /* 아이콘 선택 모달 */
  .icon-modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); z-index: 9999;
    display: flex; align-items: center; justify-content: center;
  }
  .icon-modal {
    background: #fff; border-radius: 16px; padding: 24px;
    width: 90%; max-width: 480px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  .icon-modal-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px;
  }
  .icon-modal-header h3 { margin: 0; font-size: 18px; }
  .icon-modal-close {
    background: none; border: none; font-size: 24px; cursor: pointer; color: #999;
  }
  .icon-modal-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
    margin-bottom: 20px;
  }
  .icon-modal-item {
    border: 3px solid transparent; border-radius: 12px; padding: 8px;
    cursor: pointer; transition: all 0.2s; background: #f8f8f8;
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  }
  .icon-modal-item:hover { border-color: #ddd; transform: scale(1.05); }
  .icon-modal-item.selected { border-color: #00C896; background: #e6fff6; }
  .icon-modal-item img {
    width: 100%; height: 100%; object-fit: contain; border-radius: 8px;
  }
  .icon-modal-actions {
    display: flex; justify-content: flex-end; gap: 12px;
  }
</style>
<script>
  let selectedIconName = null;

  function openIconSelector() {
    document.getElementById('iconSelectorModal').style.display = 'flex';
  }

  function closeIconSelector() {
    document.getElementById('iconSelectorModal').style.display = 'none';
  }

  function selectIcon(iconName, el) {
    // 기존 선택 해제
    document.querySelectorAll('.icon-modal-item').forEach(item => item.classList.remove('selected'));
    // 새로 선택
    el.classList.add('selected');
    selectedIconName = iconName;
  }

  function confirmIcon() {
    if (!selectedIconName) {
      alert('アイコンを選択してください');
      return;
    }
    // 미리보기 업데이트
    const wrap = document.getElementById('iconPreviewWrap');
    wrap.innerHTML = `<img src="/images/profiles/${selectedIconName}.png" alt="プロフィール"
        style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
    // hidden input 업데이트
    document.getElementById('selectedIcon').value = `/images/profiles/${selectedIconName}.png`;
    closeIconSelector();
  }
</script>
</body>
</html>
