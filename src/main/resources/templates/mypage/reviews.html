<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投稿したレビュー - デマス</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/mypage.css}">
</head>
<body class="mypage">

<div th:replace="~{fragments/header :: headerAndToast}"></div>

<div class="page-header">
    <h1 class="page-title">投稿したレビュー</h1>
    <p class="page-subtitle">自分が書いたレビューを確認できます</p>
</div>

<main class="mypage-main">
    <div class="mypage-container">

        <nav class="mp-breadcrumb">
            <a th:href="@{/mypage}">マイページ</a>
            <span>›</span>
            <span>投稿したレビュー</span>
        </nav>

        <!-- 리뷰 없을 때 -->
        <div th:if="${#lists.isEmpty(reviews)}" class="mp-empty-state">
            <div class="mp-empty-icon">⭐</div>
            <p class="mp-empty-title">まだレビューがありません</p>
            <p class="mp-empty-desc">トイレを利用したらレビューを書いてみましょう！</p>
            <a th:href="@{/}" class="mp-btn-edit">🗺️ マップを見る</a>
        </div>

        <!-- 리뷰 목록 -->
        <div th:if="${not #lists.isEmpty(reviews)}" class="mp-review-list">

            <div th:each="review : ${reviews}" class="mp-review-card">

                <!-- 카드 헤더 -->
                <div class="mp-review-header">
                    <div class="mp-review-toilet-name">
                        🚻
                        <a th:href="@{/toilet/{id}(id=${review.toiletId})}"
                           style="color:#222; text-decoration:none;"
                           th:text="'トイレ #' + ${review.toiletId}">トイレ名</a>
                    </div>
                    <!-- 별점 -->
                    <div class="mp-review-score">
            <span th:each="i : ${#numbers.sequence(1, 5)}"
                  th:classappend="${i <= T(java.lang.Integer).parseInt(review.cleanScore)} ? 'filled' : ''"
                  class="mp-star">★</span>
                        <span class="mp-score-number" th:text="${review.cleanScore}">5</span>
                    </div>
                </div>

                <!-- 리뷰 내용 -->
                <div class="mp-review-body" th:text="${review.content}">レビュー内容</div>

                <!-- 리뷰 이미지 (있을 때만) -->
                <div th:if="${review.images != null and not #lists.isEmpty(review.images)}"
                     class="mp-review-image">
                    <img th:src="${review.images[0].imageUrl}" alt="レビュー画像">
                </div>

                <!-- 카드 푸터 -->
                <div class="mp-review-footer">
    <span class="mp-review-date">
        📅 <span th:text="${#temporals.format(review.createdAt, 'yyyy.MM.dd')}">2024.01.01</span>
    </span>

                    <div class="mp-review-actions" style="display: flex; gap: 8px;">
                        <a th:href="@{/review/edit/{id}(id=${review.id})}" class="mp-btn-edit">
                            <i class="fas fa-pen"></i>修正
                        </a>

                        <button type="button" class="btn-delete"
                                th:data-id="${review.id}"
                                th:data-toilet-id="${review.toiletId}"
                                style="padding: 6px 12px; font-size: 13px; border-radius: 8px;">
                            <i class="fas fa-trash"></i>削除
                        </button>

                        <a th:href="@{/(toiletId=${review.toiletId})}" class="mp-btn-link">
                            詳細を見る →
                        </a>
                    </div>
                </div>

            </div>

        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script>
    function showAlert(msg, type = 'success') {
        document.querySelectorAll('.mp-alert').forEach(el => el.remove());

        const icon  = type === 'success' ? 'fa-circle-check' : 'fa-circle-xmark';
        const alert = document.createElement('div');
        alert.className = `mp-alert mp-alert-${type}`;
        alert.innerHTML = `<i class="fas ${icon}"></i>${msg}`;

        const breadcrumb = document.querySelector('.mp-breadcrumb');
        breadcrumb.insertAdjacentElement('afterend', alert);

        setTimeout(() => alert.remove(), 3000);
    }

    // 삭제
    document.querySelectorAll('.btn-delete').forEach(btn => {
        btn.addEventListener('click', function () {
            if (!confirm('このレビューを削除しますか？')) return;

            const id   = this.dataset.id;
            const card = this.closest('.mp-review-card');

            fetch(`/review/api/${id}/delete`, { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        card.style.transition = 'opacity 0.3s';
                        card.style.opacity = '0';
                        setTimeout(() => card.remove(), 300);
                        showAlert('レビューを削除しました。');
                    } else {
                        showAlert('削除に失敗しました。', 'error');
                    }
                })
                .catch(() => showAlert('削除に失敗しました。', 'error'));
        });
    });
</script>


<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/header.js(v=1)}"></script>
</body>
</html>
