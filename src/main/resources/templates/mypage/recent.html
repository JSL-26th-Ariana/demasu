<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最近見たトイレ - デマス</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/mypage.css}">
</head>
<body class="mypage">

<div th:replace="~{fragments/header :: headerAndToast}"></div>

<div class="page-header">
    <h1 class="page-title">最近見たトイレ</h1>
    <p class="page-subtitle">最近チェックしたトイレの閲覧履歴</p>
</div>

<main class="mypage-main">
    <div class="mypage-container">

        <!-- 데이터 있는 경우 -->
        <div th:if="${recentToilets != null and !recentToilets.isEmpty()}">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:16px;">
                <span style="font-size:18px; font-weight:700; color:#1A1A1A;">最近見たトイレ</span>
                <span class="mp-count-badge" th:text="${recentToilets.size()}">0</span>
            </div>

            <div class="mp-toilet-list">
                <a th:each="item : ${recentToilets}"
                   th:href="@{/toilet/{id}(id=${item.toiletId})}"
                   class="mp-toilet-card" style="text-decoration:none; justify-content:space-between; align-items:flex-start;">
                    <div class="mp-toilet-card-body">
                        <p class="mp-toilet-name" th:text="${item.toiletName}">トイレ名</p>
                        <p class="mp-toilet-address" th:text="${item.address}">住所</p>
                    </div>
                    <div style="display:flex; flex-direction:column; align-items:flex-end; gap:8px; margin-left:16px; flex-shrink:0;">
            <span style="font-size:11px; color:#bbb; white-space:nowrap;"
                  th:text="${#temporals.format(item.viewedAt, 'MM/dd HH:mm')}">01/01</span>
                        <span style="font-size:12px; color:#00C896; font-weight:500; white-space:nowrap;">詳細を見る →</span>
                    </div>
                </a>
            </div>
        </div>

        <!-- 빈 상태 -->
        <div class="mp-empty-state" th:if="${recentToilets == null or recentToilets.isEmpty()}">
            <div class="mp-empty-icon">
                <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#CCC" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M12 6v6l4 2"></path>
                </svg>
            </div>
            <p class="mp-empty-title">まだ見たトイレがありません</p>
            <p class="mp-empty-desc">マップでトイレを探して<br>詳細情報を確認してみましょう！</p>
            <a th:href="@{/}" class="mp-btn-edit">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                </svg>
                マップを見る
            </a>
        </div>

    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/header.js(v=1)}"></script>
</body>
</html>
