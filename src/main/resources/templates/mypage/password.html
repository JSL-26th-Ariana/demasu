<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワード変更 - デマス</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@linefukuoka/line-seed-jp@1.0.0/fonts/css/line-seed-jp.css">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/mypage.css}">
</head>
<body class="mypage">

<div th:replace="~{fragments/header :: headerAndToast}"></div>

<div class="page-header">
    <h1 class="page-title">パスワード変更</h1>
    <p class="page-subtitle">セキュリティのため、定期的なパスワード変更をお勧めします</p>
</div>

<main class="mypage-main">
    <div class="mypage-container">

        <nav class="mp-breadcrumb">
            <a th:href="@{/mypage}">マイページ</a>
            <span>›</span>
            <span>パスワード変更</span>
        </nav>

        <div id="successMsg" class="mp-alert mp-alert-success" style="display:none;">
            ✅ パスワードを変更しました。3秒後にマイページへ移動します。
        </div>
        <div id="errorMsg" class="mp-alert mp-alert-error" style="display:none;"></div>

        <div class="mp-password-card">

            <div class="mp-password-icon-area">
                <div class="mp-password-icon-circle">🔒</div>
                <p>8文字以上で<br>設定してください</p>
            </div>

            <div class="mp-password-form-area">

                <div class="mp-form-group">
                    <label for="currentPassword">現在のパスワード <span class="mp-required">*</span></label>
                    <div class="mp-input-with-toggle">
                        <input type="password" id="currentPassword" placeholder="現在のパスワードを入力">
                        <button type="button" class="mp-toggle-pw" onclick="togglePw('currentPassword', this)">👁</button>
                    </div>
                </div>

                <div class="mp-form-group">
                    <label for="newPassword">新しいパスワード <span class="mp-required">*</span></label>
                    <div class="mp-input-with-toggle">
                        <input type="password" id="newPassword" placeholder="新しいパスワードを入力"
                               oninput="checkStrength(this.value); checkMatch();">
                        <button type="button" class="mp-toggle-pw" onclick="togglePw('newPassword', this)">👁</button>
                    </div>
                    <div class="mp-password-strength">
                        <div class="mp-strength-fill" id="strengthFill"></div>
                    </div>
                    <span class="mp-strength-text" id="strengthText"></span>
                </div>

                <div class="mp-form-group">
                    <label for="confirmPassword">新しいパスワード（確認） <span class="mp-required">*</span></label>
                    <div class="mp-input-with-toggle">
                        <input type="password" id="confirmPassword" placeholder="もう一度入力してください"
                               oninput="checkMatch()">
                        <button type="button" class="mp-toggle-pw" onclick="togglePw('confirmPassword', this)">👁</button>
                    </div>
                    <span class="mp-match-text" id="matchText"></span>
                </div>

                <div class="mp-password-rules">
                    <p>🛡️ パスワードの条件</p>
                    <ul>
                        <li>・ 8文字以上</li>
                        <li>・ 英字・数字を含むことを推奨</li>
                    </ul>
                </div>

                <div class="mp-form-actions">
                    <a th:href="@{/mypage}" class="mp-btn-cancel">キャンセル</a>
                    <button type="button" class="mp-btn-save" onclick="submitPassword()">🔑 変更する</button>
                </div>

            </div>
        </div>

    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>



<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/header.js(v=1)}"></script>
<script>

    function togglePw(id, btn) {
      const input = document.getElementById(id);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁';
      }
    }

    function checkStrength(pw) {
      const fill = document.getElementById('strengthFill');
      const text = document.getElementById('strengthText');
      if (!pw) { fill.style.width = '0%'; text.textContent = ''; return; }
      let score = 0;
      if (pw.length >= 8) score++;
      if (/[A-Za-z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      const levels = [
        { width: '25%', color: '#FF6B6B', label: '弱い' },
        { width: '50%', color: '#FFB800', label: '普通' },
        { width: '75%', color: '#00C896', label: '強い' },
        { width: '100%', color: '#00896A', label: 'とても強い' },
      ];
      const level = levels[Math.min(score, 4) - 1] || levels[0];
      fill.style.width = level.width;
      fill.style.backgroundColor = level.color;
      text.textContent = level.label;
      text.style.color = level.color;
    }

    function checkMatch() {
      const pw = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmPassword').value;
      const matchText = document.getElementById('matchText');
      if (!confirm) { matchText.textContent = ''; return; }
      if (pw === confirm) {
        matchText.textContent = '✅ パスワードが一致しています';
        matchText.style.color = '#00C896';
      } else {
        matchText.textContent = '❌ パスワードが一致しません';
        matchText.style.color = '#FF6B6B';
      }
    }

    async function submitPassword() {
      const currentPassword = document.getElementById('currentPassword').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      if (!currentPassword || !newPassword || !confirmPassword) {
        errorMsg.textContent = '⚠️ すべての項目を入力してください。';
        errorMsg.style.display = 'flex';
        return;
      }
      if (newPassword.length < 8) {
        errorMsg.textContent = '⚠️ 新しいパスワードは8文字以上で入力してください。';
        errorMsg.style.display = 'flex';
        return;
      }
      if (newPassword !== confirmPassword) {
        errorMsg.textContent = '⚠️ 新しいパスワードが一致しません。';
        errorMsg.style.display = 'flex';
        return;
      }

      const params = new URLSearchParams();
      params.append('currentPassword', currentPassword);
      params.append('newPassword', newPassword);

      try {
        const res = await fetch('/mypage/password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
          },
          body: params
        });
        const data = await res.json();
        if (data.success) {
          successMsg.style.display = 'flex';
          setTimeout(() => { location.href = '/mypage'; }, 3000);
        } else {
          errorMsg.textContent = '⚠️ ' + (data.message || 'エラーが発生しました。');
          errorMsg.style.display = 'flex';
        }
      } catch (e) {
        errorMsg.textContent = '⚠️ 通信エラーが発生しました。';
        errorMsg.style.display = 'flex';
      }
    }
</script>
</body>
</html>
