<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security6">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>レビューを修正 - デマス</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@linefukuoka/line-seed-jp@1.0.0/fonts/css/line-seed-jp.css">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/review-write.css}">
</head>
<body>

<div th:replace="~{fragments/header :: headerAndToast}"></div>

<!-- 페이지 헤더 -->
<div class="page-header">
    <h1 class="page-title">レビューを修正</h1>
    <p class="page-subtitle">内容を変更して保存してください。</p>
</div>

<!-- 폼 카드 -->
<div class="container">
    <div class="card">

        <!-- 화장실 정보 카드 -->
        <div class="toilet-info-card" th:if="${toilet}">
            <span class="toilet-info-icon">🚻</span>
            <div class="toilet-info-text">
                <div class="label">レビュー対象</div>
                <div class="toilet-name" th:text="${toilet.name}">トイレ名</div>
                <div class="toilet-addr" th:text="${toilet.address}">住所</div>
            </div>
        </div>
        <div class="toilet-info-card" th:unless="${toilet}">
            <span class="toilet-info-icon">🚻</span>
            <div class="toilet-info-text">
                <div class="label">レビュー対象</div>
                <div class="toilet-name">トイレ情報</div>
                <div class="toilet-addr">—</div>
            </div>
        </div>

        <!-- 에러 메시지 -->
        <div class="error-message" th:if="${error}" style="display:flex;">
            <span>⚠️</span>
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/review/api/update}" method="post"
              enctype="multipart/form-data" id="reviewForm">

            <!-- 숨김 필드 -->
            <input type="hidden" name="id"       th:value="${review.id}">
            <input type="hidden" name="toiletId" th:value="${review.toiletId}">
            <input type="hidden" name="userId"   th:value="${review.userId}">

            <!-- ① 清潔度スコア -->
            <div class="score-section">
                <label>清潔度スコア <span class="required">*</span></label>
                <div class="star-group" id="starGroup">
                    <span class="star" data-val="1">★</span>
                    <span class="star" data-val="2">★</span>
                    <span class="star" data-val="3">★</span>
                    <span class="star" data-val="4">★</span>
                    <span class="star" data-val="5">★</span>
                    <span class="score-label" id="scoreLabel">未選択</span>
                </div>
                <input type="hidden" name="cleanScore" id="cleanScore"
                       th:value="${review.cleanScore}"
                       th:data-initial="${review.cleanScore}" required>
            </div>

            <div class="divider"></div>

            <!-- ② 태그 -->
            <div class="form-group">
                <label>ひとことタグ <span style="color:#BBBBBB;font-weight:400;">(複数選択可)</span></label>
                <div class="tag-group" id="tagGroup">
                    <button type="button" class="tag-btn" data-tag="石鹸"><span class="tag-emoji">🧼</span>石鹸</button>
                    <button type="button" class="tag-btn" data-tag="清潔"><span class="tag-emoji">🧹</span>清潔</button>
                    <button type="button" class="tag-btn" data-tag="多目的トイレ"><span class="tag-emoji">🧑‍🧑‍🧒‍🧒</span>多目的トイレ</button>
                    <button type="button" class="tag-btn" data-tag="おむつ交換台"><span class="tag-emoji">👶</span>おむつ交換台</button>
                    <button type="button" class="tag-btn" data-tag="トイレットペーパー"><span class="tag-emoji">🧻</span>トイレットペーパー</button>
                    <button type="button" class="tag-btn" data-tag="混雑"><span class="tag-emoji">👥</span>混雑</button>
                    <button type="button" class="tag-btn" data-tag="バリアフリー"><span class="tag-emoji">♿</span>バリアフリー</button>
                    <button type="button" class="tag-btn" data-tag="洗面台"><span class="tag-emoji">🚿</span>洗面台</button>
                    <button type="button" class="tag-btn" data-tag="ビデ"><span class="tag-emoji">🚽</span>ビデ</button>
                </div>
                <input type="hidden" name="tags" id="tagsInput" th:value="${review.tags}">
            </div>

            <!-- ③ 본문 -->
            <div class="form-group">
                <label>レビュー内容 <span class="required">*</span></label>
                <div class="input-group textarea-group">
                    <textarea name="content" id="contentInput"
                              placeholder="清潔さ、使いやすさ、混雑具合など、気づいたことを書いてください。"
                              required maxlength="500"
                              th:text="${review.content}"></textarea>
                </div>
                <div class="char-count"><span id="charCount">0</span> / 500</div>
            </div>

            <!-- ④ 이미지 -->
            <div class="image-upload-section">
                <div class="upload-label-row">
                    <label>写真を追加</label>
                    <span class="upload-notice-inline">⚠️場所と関係のない内容や、他人の顔が写った写真はお控えください。</span>
                </div>

                <!-- 기존 이미지 미리보기 -->
                <div th:if="${review.images != null and not #lists.isEmpty(review.images)}">
                    <p style="font-size:12px; color:#AAAAAA; margin-bottom:8px;">現在登録されている写真（新しい写真を選択すると全て置き換えられます）</p>
                    <div class="preview-grid" style="margin-bottom:14px;">
                        <div th:each="img : ${review.images}" class="preview-item">
                            <img th:src="${img.imageUrl}" alt="既存画像">
                        </div>
                    </div>
                </div>

                <div class="drop-zone" id="dropZone">
                    <input type="file" name="files" id="fileInput" accept="image/*" multiple>
                    <div class="drop-zone-icon">🖼️</div>
                    <p><span class="highlight">クリックして選択</span>、またはここにドラッグ＆ドロップ</p>
                    <p class="file-limit">PNG, JPG, WEBP ／ 1ファイル最大5MB ／ 最大5枚</p>
                </div>
                <div class="preview-grid" id="previewGrid"></div>
                <div class="preview-count" id="previewCount"></div>
            </div>

            <!-- ⑤ 저장 버튼 -->
            <p class="review-notice">
                ⚠️ 不適切なレビューは削除される場合があります。
            </p>

            <button type="submit" class="btn-submit" id="submitBtn">
                修正を保存する
            </button>

        </form>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script>
    /* ─── 1. 별점 초기화 ─── */
    const stars      = document.querySelectorAll('.star');
    const scoreInput = document.getElementById('cleanScore');
    const scoreLabel = document.getElementById('scoreLabel');
    const scoreText  = ['', '最悪', '悪い', '普通', '良い', '最高！'];

    function applyStars(val) {
        scoreInput.value = val;
        scoreLabel.textContent = val ? scoreText[val] : '未選択';
        stars.forEach(s => {
            s.classList.toggle('active', parseInt(s.dataset.val) <= val);
            s.style.color = parseInt(s.dataset.val) <= val ? '#f59e0b' : '';
        });
    }

    // 기존 점수로 초기화
    const initialScore = parseInt(scoreInput.dataset.initial) || 0;
    if (initialScore) applyStars(initialScore);

    stars.forEach(star => {
        star.addEventListener('click', () => applyStars(parseInt(star.dataset.val)));
        star.addEventListener('mouseenter', () => {
            const val = parseInt(star.dataset.val);
            stars.forEach(s => { s.style.color = parseInt(s.dataset.val) <= val ? '#f59e0b' : ''; });
        });
    });
    document.getElementById('starGroup').addEventListener('mouseleave', () => {
        const selected = parseInt(scoreInput.value) || 0;
        stars.forEach(s => { s.style.color = parseInt(s.dataset.val) <= selected ? '#f59e0b' : ''; });
    });

    /* ─── 2. 태그 초기화 ─── */
    const tagsInput    = document.getElementById('tagsInput');
    let   selectedTags = tagsInput.value ? tagsInput.value.split(',').map(t => t.trim()).filter(Boolean) : [];

    document.querySelectorAll('.tag-btn').forEach(btn => {
        if (selectedTags.includes(btn.dataset.tag)) btn.classList.add('selected');
        btn.addEventListener('click', () => {
            const tag = btn.dataset.tag;
            btn.classList.toggle('selected');
            selectedTags = btn.classList.contains('selected')
                ? [...selectedTags, tag]
                : selectedTags.filter(t => t !== tag);
            tagsInput.value = selectedTags.join(',');
        });
    });

    /* ─── 3. 글자수 카운터 ─── */
    const contentInput = document.getElementById('contentInput');
    document.getElementById('charCount').textContent = contentInput.value.length;
    contentInput.addEventListener('input', function() {
        document.getElementById('charCount').textContent = this.value.length;
    });

    /* ─── 4. 이미지 업로드 & 미리보기 ─── */
    const fileInput    = document.getElementById('fileInput');
    const dropZone     = document.getElementById('dropZone');
    const previewGrid  = document.getElementById('previewGrid');
    const previewCount = document.getElementById('previewCount');
    const MAX_FILES    = 5;
    let   dataTransfer = new DataTransfer();

    dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        addFiles([...e.dataTransfer.files]);
    });
    fileInput.addEventListener('change', () => addFiles([...fileInput.files]));

    function addFiles(newFiles) {
        for (const file of newFiles) {
            if (dataTransfer.files.length >= MAX_FILES) break;
            if (!file.type.startsWith('image/')) continue;
            if (file.size > 5 * 1024 * 1024) { alert(`${file.name} は5MBを超えています。`); continue; }
            dataTransfer.items.add(file);
        }
        fileInput.files = dataTransfer.files;
        renderPreviews();
    }

    function removeFile(index) {
        const newDt = new DataTransfer();
        [...dataTransfer.files].forEach((f, i) => { if (i !== index) newDt.items.add(f); });
        dataTransfer = newDt;
        fileInput.files = dataTransfer.files;
        renderPreviews();
    }

    function renderPreviews() {
        previewGrid.innerHTML = '';
        [...dataTransfer.files].forEach((file, index) => {
            const reader = new FileReader();
            reader.onload = e => {
                const item = document.createElement('div');
                item.className = 'preview-item';
                item.innerHTML = `
                    <img src="${e.target.result}" alt="preview">
                    <button type="button" class="remove-btn" onclick="removeFile(${index})">✕</button>`;
                previewGrid.appendChild(item);
            };
            reader.readAsDataURL(file);
        });
        const cnt = dataTransfer.files.length;
        previewCount.textContent = cnt > 0 ? `${cnt} / ${MAX_FILES} 枚選択中` : '';
    }

    /* ─── 5. 폼 제출 유효성 검사 ─── */
    document.getElementById('reviewForm').addEventListener('submit', function(e) {
        if (!scoreInput.value) {
            e.preventDefault();
            alert('清潔度スコアを選択してください。');
            return;
        }
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '⏳ 保存中...';
    });
</script>

<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/header.js(v=1)}"></script>
</body>
</html>
